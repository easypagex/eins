<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einstein × EasyWebX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* SPEECH BUBBLE */
  .bubble {
    position: relative;
    background: #fff;
    border: 3px solid #222;
    border-radius: 4px;
    padding: 18px 22px;
    width: 320px;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0;
    box-shadow: 4px 4px 0 #333;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .bubble.show {
    opacity: 1;
    transform: translateY(0);
  }

  .bubble p {
    font-family: 'Special Elite', cursive;
    font-size: 14px;
    color: #111;
    text-align: center;
    line-height: 1.55;
  }

  /* Triangle pointer downward */
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 18px solid #fff;
    z-index: 2;
  }
  .bubble::before {
    content: '';
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 20px solid #222;
    z-index: 1;
  }

  /* IMAGE */
  .photo-wrapper {
    width: 320px;
    height: 400px;
    position: relative;
    cursor: pointer;
    margin-top: 4px;
  }

  .photo-wrapper img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    border: 3px solid #333;
    transition: opacity 0.6s ease;
  }

  #img1 { opacity: 1; }
  #img2 { opacity: 0; }

  /* BUTTON */
  .btn-wrap {
    margin-top: 28px;
  }

  .easywebx-btn {
    display: inline-block;
    background: #fff;
    color: #000;
    font-family: 'Special Elite', cursive;
    font-size: 15px;
    letter-spacing: 3px;
    padding: 12px 32px;
    border: 2px solid #fff;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
    box-shadow: 3px 3px 0 #555;
  }

  .easywebx-btn:hover {
    background: #000;
    color: #fff;
  }


</style>
</head>

<script>
const quotes = [
  '"Imagination is more important than knowledge."',
  '"A page that works while you sleep is worth more than a salesman who works only while awake."',
  '"The true sign of intelligence is not knowledge but imagination."',
  '"The man who sends a visitor to his homepage instead of a landing page has learned nothing from his mistakes."',
  '"I have no special talent. I am only passionately curious."',
  '"One question, one answer, one action — that is the whole secret of a page that converts."',
  '"The important thing is not to stop questioning. Curiosity has its own reason for existing."',
  '"Ninety-six visitors out of a hundred leave and never return — unless you were wise enough to ask for their name."',
  '"Life is like riding a bicycle. To keep your balance, you must keep moving."',
  '"The business that does not grow its community today will spend tomorrow wondering where its customers went."',
  '"In the middle of difficulty lies opportunity."',
  '"The difference between a business that thrives and one that vanishes is often a single well-placed page."',
  '"If you can\'t explain it simply, you don\'t understand it well enough."',
  '"Five times more conversions is not magic — it is the inevitable result of removing everything unnecessary."',
  '"Two things are infinite: the universe and human stupidity; and I\'m not sure about the universe."',
  '"Tell us your vision. We shall do the rest — and you shall go live before doubt has time to intervene."',
  '"A person who never made a mistake never tried anything new."',
  '"Results on the first day are not ambition — they are the natural consequence of a page built with purpose."',
  '"Education is what remains after one has forgotten what one has learned in school."',
  '"The measure of intelligence is the ability to change."',
];

// Cosmic chirp sound via Web Audio API
function playChirp() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.type = 'sine';
  // Gravitational wave chirp: frequency sweeps up
  osc.frequency.setValueAtTime(80, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(520, ctx.currentTime + 0.35);
  osc.frequency.exponentialRampToValueAtTime(260, ctx.currentTime + 0.55);

  gain.gain.setValueAtTime(0.001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.35, ctx.currentTime + 0.15);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);

  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.6);
}

let step = 0;
let showingImg1 = true;

function cycle() {
  const bubble = document.getElementById('bubble');
  const quoteText = document.getElementById('quoteText');
  const img1 = document.getElementById('img1');
  const img2 = document.getElementById('img2');
  // Hide bubble briefly
  bubble.classList.remove('show');

  setTimeout(() => {
    // Set quote
    quoteText.textContent = quotes[step % quotes.length];

    // Toggle image
    if (showingImg1) {
      img1.style.opacity = '0';
      img2.style.opacity = '1';
    } else {
      img1.style.opacity = '1';
      img2.style.opacity = '0';
    }
    showingImg1 = !showingImg1;

    // Play chirp
    playChirp();

    // Show bubble
    bubble.classList.add('show');

    step++;
  }, 300);
}

// Init
document.getElementById('quoteText').textContent = quotes[0];
document.getElementById('bubble').classList.add('show');

let timer = setInterval(cycle, 5000);

// Click anywhere on the photo to advance immediately
document.getElementById('photoWrap').addEventListener('click', () => {
  clearInterval(timer);
  cycle();
  timer = setInterval(cycle, 5000);
});
</script>
